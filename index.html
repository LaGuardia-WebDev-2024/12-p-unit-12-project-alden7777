<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About ALDEN</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        What is my sport?
        <select id="movie-answer">
          <option value="movie1">BASEBALL</option>
          <option value="movie2">BASKETBALL</option>
          <option value="movie3">VOLLEYBALL</option>
          <option value="movie4">ULTIMATE FRISBEE</option>
        </select>
      </label>
      <button type="submit">Check Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      <img class="VB-IMAGE">
      
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        who IS THAT
        <select id="book-answer">
          <option value="book1">?</option>
          <option value="book2">??</option>
          <option value="book3">??!</option>
          <option value="book4">???!</option>
        </select>
      </label>
      <button type="submit">Check Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
      <img class="whoisthat">
      <img class="thedud">
      
    </div>
    <button id="deez">press</button>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie3") {
          $("#movie-text").text("YURP");
          $(".VB-IMAGE").attr("src","https://static.vecteezy.com/system/resources/thumbnails/035/320/507/small/ai-generated-volleyball-ball-isolated-on-transparent-background-free-png.png").fadeIn(1000)
        } 
        else {
          $("#movie-text").text("wrong");
          $(".VB-IMAGE").hide()

        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $(".whoisthat").attr("src","https://media.tenor.com/JWzIaFEJs2gAAAAM/who-is-he.gif").fadeIn(1000);
          $(".thedud").hide()
          $("#book-text").hide()
        } 
        else {
          $("#book-text").text("WRONG");
          $(".thedud").attr("src","https://static.wikia.nocookie.net/simpsonsfanon/images/6/6c/Dudhouse.jpeg/revision/latest?cb=20230405094645").show(1000);
          $(".whoisthat").hide()
        } 
      });
       $("#deez").click(function () {
        $("#deez").animate({
          width: "50px",
          height: "30px",
          marginLeft: "0px",
          marginTop: "0px",
          rotate: "-1080deg",
        })
        
       });
          $("#deez").mouseover(function () {
        $("#deez").animate({
          width: "100px",
          height: "100px",
          marginLeft: "200px",
          marginTop: "50px",
          rotate: "1080deg",
        })
        
       });
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
